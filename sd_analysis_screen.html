<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwipeSet - SD Analysis & Processing Screen</title>
    
    <!-- 
    =============================================================================
    SWIPESET SD (SEMANTIC DEEP) ANALYSIS & PROCESSING SCREEN
    =============================================================================
    
    VERSION: 1.0 - Semantic Deep Dive Analysis Interface
    
    PURPOSE: Multi-stage property analysis showing AI-powered semantic processing
    
    KEY FEATURES:
    1. Three-Stage Analysis Process
    2. Real-time Progress Indicators
    3. Animated Stage Transitions
    4. Semantic Analysis Results
    5. Property Lifestyle Matching
    
    ANALYSIS STAGES:
    - Stage 1: Analyzing properties (33%)
    - Stage 2: Performing semantic deep dive (66%)
    - Stage 3: Finalizing results (100%)
    
    =============================================================================
    -->
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 45px;
            padding: 4px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .screen {
            width: 100%;
            height: 100%;
            background: #0f172a;
            border-radius: 41px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }
        
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }
        
        /* Logo Animation */
        .logo-container {
            width: 120px;
            height: 120px;
            margin-bottom: 40px;
            position: relative;
        }
        
        .logo {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255,255,255,0.1),
                transparent
            );
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }
        
        /* Progress Ring */
        .progress-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
        }
        
        .progress-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        
        .progress-ring-circle {
            fill: none;
            stroke: #1e40af;
            stroke-width: 3;
        }
        
        .progress-ring-progress {
            fill: none;
            stroke: #3b82f6;
            stroke-width: 3;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        
        /* Stage Information */
        .stage-info {
            text-align: center;
            color: white;
        }
        
        .stage-number {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .stage-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stage-description {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        /* Progress Bar */
        .progress-container {
            width: 100%;
            max-width: 280px;
            margin-bottom: 24px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            animation: wave 1.5s infinite;
        }
        
        @keyframes wave {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        .progress-text {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Analysis Items */
        .analysis-items {
            width: 100%;
            max-width: 320px;
            margin-top: 20px;
        }
        
        .analysis-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.5s forwards;
        }
        
        .analysis-item:nth-child(1) { animation-delay: 0.1s; }
        .analysis-item:nth-child(2) { animation-delay: 0.2s; }
        .analysis-item:nth-child(3) { animation-delay: 0.3s; }
        .analysis-item:nth-child(4) { animation-delay: 0.4s; }
        
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .analysis-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            margin-right: 12px;
        }
        
        .analysis-text {
            flex: 1;
            font-size: 14px;
            color: #cbd5e1;
        }
        
        .analysis-status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .analysis-status.pending {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        
        .analysis-status.active {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            animation: pulse 1.5s infinite;
        }
        
        .analysis-status.complete {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }
        
        /* Stage-specific styles */
        .stage-1 .progress-fill { width: 33%; }
        .stage-2 .progress-fill { width: 66%; }
        .stage-3 .progress-fill { width: 100%; }
        
        /* Cancel button */
        .cancel-btn {
            position: absolute;
            bottom: 40px;
            padding: 12px 24px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 24px;
            color: #f87171;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .cancel-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="screen stage-2">
            <div class="status-bar">
                <span>9:41</span>
                <span>••••• </span>
                <span>100% 🔋</span>
            </div>
            
            <div class="content">
                <div class="logo-container">
                    <div class="logo">🏠</div>
                    <div class="progress-ring">
                        <svg>
                            <circle class="progress-ring-circle" cx="70" cy="70" r="66" stroke-dasharray="415" stroke-dashoffset="0"></circle>
                            <circle class="progress-ring-progress" cx="70" cy="70" r="66" stroke-dasharray="415" stroke-dashoffset="141"></circle>
                        </svg>
                    </div>
                </div>
                
                <div class="stage-info">
                    <div class="stage-number">STAGE 2 OF 3</div>
                    <div class="stage-title">Semantic Deep Dive</div>
                    <div class="stage-description">
                        Analyzing lifestyle compatibility and<br>property features
                    </div>
                </div>
                
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <div class="progress-text">66% Complete</div>
                </div>
                
                <div class="analysis-items">
                    <div class="analysis-item">
                        <div class="analysis-icon">📊</div>
                        <div class="analysis-text">Property data collection</div>
                        <div class="analysis-status complete">✓</div>
                    </div>
                    
                    <div class="analysis-item">
                        <div class="analysis-icon">🧠</div>
                        <div class="analysis-text">Semantic analysis processing</div>
                        <div class="analysis-status active">●</div>
                    </div>
                    
                    <div class="analysis-item">
                        <div class="analysis-icon">🎯</div>
                        <div class="analysis-text">Lifestyle matching algorithm</div>
                        <div class="analysis-status pending">○</div>
                    </div>
                    
                    <div class="analysis-item">
                        <div class="analysis-icon">📈</div>
                        <div class="analysis-text">Generating recommendations</div>
                        <div class="analysis-status pending">○</div>
                    </div>
                </div>
                
                <button class="cancel-btn">Cancel Analysis</button>
            </div>
        </div>
    </div>
    
    <script>
        // Simulate stage progression
        let currentStage = 2;
        const stages = [
            {
                number: 1,
                title: "Analyzing Properties",
                description: "Gathering property data from MLS<br>and public records",
                progress: 33
            },
            {
                number: 2,
                title: "Semantic Deep Dive",
                description: "Analyzing lifestyle compatibility and<br>property features",
                progress: 66
            },
            {
                number: 3,
                title: "Finalizing Results",
                description: "Preparing your personalized<br>property recommendations",
                progress: 100
            }
        ];
        
        function updateStage(stageNum) {
            const stage = stages[stageNum - 1];
            const screen = document.querySelector('.screen');
            
            // Update stage class
            screen.className = `screen stage-${stageNum}`;
            
            // Update text content
            document.querySelector('.stage-number').textContent = `STAGE ${stage.number} OF 3`;
            document.querySelector('.stage-title').textContent = stage.title;
            document.querySelector('.stage-description').innerHTML = stage.description;
            document.querySelector('.progress-text').textContent = `${stage.progress}% Complete`;
            
            // Update progress ring
            const circumference = 415;
            const offset = circumference - (stage.progress / 100 * circumference);
            document.querySelector('.progress-ring-progress').style.strokeDashoffset = offset;
            
            // Update analysis items
            updateAnalysisItems(stageNum);
        }
        
        function updateAnalysisItems(stage) {
            const items = document.querySelectorAll('.analysis-status');
            items.forEach((item, index) => {
                if (stage === 1) {
                    item.className = index === 0 ? 'analysis-status active' : 'analysis-status pending';
                } else if (stage === 2) {
                    if (index < 1) item.className = 'analysis-status complete';
                    else if (index === 1) item.className = 'analysis-status active';
                    else item.className = 'analysis-status pending';
                } else if (stage === 3) {
                    if (index < 3) item.className = 'analysis-status complete';
                    else if (index === 3) item.className = 'analysis-status active';
                }
            });
        }
        
        // Auto-progress through stages for demo
        setInterval(() => {
            currentStage = currentStage >= 3 ? 1 : currentStage + 1;
            updateStage(currentStage);
        }, 4000);
    </script>
</body>
</html>
